services:
  postgres:
    image: postgres:16-alpine
    container_name: stockcountpro-postgres
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.local}
      POSTGRES_DB: ${POSTGRES_DB:-stockcountpro}
    ports:
      - "5432:5432"
    volumes:
      - stockcount_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stockcountpro"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  stockcount_pgdata:
