services:
  postgres:
    image: postgres:16-alpine
    container_name: stockcountpro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stockcount
      POSTGRES_PASSWORD: stockcount
      POSTGRES_DB: stockcountpro
    ports:
      - "5432:5432"
    volumes:
      - stockcount_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockcount -d stockcountpro"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  stockcount_pgdata:
